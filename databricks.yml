# This is a Databricks asset bundle definition for my_asset_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: my_asset_bundle
  uuid: 35dcd396-1d76-4c9b-8209-3e85c28ab070

include:
  - resources/*.yml
  - resources/*/*.yml


# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-ec9ae0f7-33ee.cloud.databricks.com
    variables:
      catalog: professional
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://dbc-ec9ae0f7-33ee.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/yuva.phani@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/yuva.phani@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: professional
      schema: prod
    permissions:
      - user_name: yuva.phani@gmail.com
        level: CAN_MANAGE
